name: mr_croc
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  responsive_builder: ^0.4.0
  esc_pos_printer_plus: ^0.1.1
  esc_pos_utils_plus: ^2.0.4
  calendar_date_picker2: ^0.5.5
  intl: ^0.19.0
  pie_chart: ^5.4.0
  icons_launcher: ^2.0.7
  supabase_flutter: ^2.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/cw_database.db

icons_launcher:
  image_path: "assets/icon/app_icon.png"
  platforms:
    android:
      enable: true
    ios:
      enable: true
